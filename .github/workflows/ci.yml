name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main          # post-merge sanity check
      - 'feat/**'
      - 'fix/**'

permissions:
  contents: read

jobs:
  lint-docs:
    name: Lint docs and structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify required files exist
        run: |
          test -f README.md
          test -f .gitignore
          test -f docs/tech/georgia_places_tz.md
          test -d docs/tech/adr

      - name: Check no secrets committed
        run: |
          # Simple grep for obvious secret patterns. Will be replaced by gitleaks once stack is in place.
          ! grep -rE "(AKIA[0-9A-Z]{16}|AIza[0-9A-Za-z\\-_]{35}|gh[ps]_[A-Za-z0-9]{36,}|glc_[A-Za-z0-9]{40,})" \
            --include="*.cs" --include="*.py" --include="*.json" --include="*.yml" --include="*.sh" \
            --exclude-dir=node_modules --exclude-dir=.git . || \
            { echo "Possible secret detected"; exit 1; }

  backend:
    name: Backend build + unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: source/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore GeorgiaPlaces.slnx

      - name: Build
        run: dotnet build GeorgiaPlaces.slnx -c Release --no-restore

      - name: Unit tests
        run: dotnet test tests/GeorgiaPlaces.Tests.Unit/GeorgiaPlaces.Tests.Unit.csproj -c Release --no-build --logger 'trx;LogFileName=unit.trx'

      # Integration tests require Docker (Testcontainers); enabled once GitHub-hosted runners
      # confirm reliable Docker availability for the test workload.

  infra:
    name: Infra docker-compose validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: source/infra
    steps:
      - uses: actions/checkout@v4

      - name: Prepare .env from example
        run: cp .env.example .env

      - name: Prepare placeholder secrets
        run: |
          mkdir -p secrets
          echo "Authorization=Basic placeholder" > secrets/otlp_headers
          echo "https://placeholder@sentry.example/0" > secrets/sentry_dsn

      - name: Validate compose syntax
        run: docker compose config --quiet

  publish-image:
    name: Publish API image to ghcr.io
    runs-on: ubuntu-latest
    needs: [backend, infra, lint-docs]
    # Only publish from main — feature branches build locally during dev.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}-api" >> "$GITHUB_OUTPUT"

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: source/backend
          file: source/backend/src/GeorgiaPlaces.Api/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
