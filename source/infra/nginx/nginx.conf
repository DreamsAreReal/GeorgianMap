user nginx;
worker_processes auto;
worker_rlimit_nofile 4096;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format json escape=json '{'
        '"time":"$time_iso8601",'
        '"remote":"$remote_addr",'
        '"method":"$request_method",'
        '"path":"$request_uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"rt":$request_time,'
        '"corr":"$http_x_correlation_id",'
        '"ua":"$http_user_agent",'
        '"cf_ray":"$http_cf_ray"'
    '}';
    access_log /var/log/nginx/access.log json;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    # Gzip for JSON responses (≥1KB), per ADR-0006 / TZ performance.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types application/json application/javascript text/css text/plain text/xml;
    gzip_comp_level 5;

    # Rate limiting — second line of defence behind Cloudflare WAF (REVIEW-BACKLOG P1).
    # 100 req/min per IP for the API surface.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
    limit_req_status 429;

    # Connection pool to upstream API.
    upstream api_backend {
        server api:8080 max_fails=2 fail_timeout=10s;
        keepalive 32;
    }

    # Hide direct port 80 — Cloudflare orange-cloud handles TLS at the edge.
    # In dev: API reachable directly on :80. In prod: Cloudflare forces HTTPS.
    server {
        listen 80 default_server;
        server_name _;

        # Nginx-level health (used by docker-compose healthcheck).
        # Bypasses upstream — answers even if API is down.
        location = /health {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # API routes.
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            # Pass-through correlation ID; API generates one if missing.
            proxy_set_header X-Correlation-Id $http_x_correlation_id;

            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # Expose correlation header to browser JS (P1 from 2nd review).
            add_header Access-Control-Expose-Headers "X-Correlation-Id" always;
        }

        # Static frontend (MVP map). In prod will be served by Cloudflare Pages,
        # but for local dev + tunnel demo we serve it from this nginx.
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache" always;
        }
    }

    # Per-domain server blocks would go in conf.d/*.conf when TLS is wired.
    include /etc/nginx/conf.d/*.conf;
}
