; Ofelia job scheduler config — replaces host-side cron entirely.
; Reference: https://github.com/mcuadros/ofelia
;
; All times UTC. Schedules use Go's robfig/cron 6-field format
; (sec min hour dom mon dow). ${VAR} interpolated from ofelia's own env
; (which we feed from .env via compose env_file).

; Ofelia 0.3.16 streams logs to stdout — captured by `docker compose logs cron`.
; Slack/email hooks would go in [global] when we wire alerting.

; ─── parser: daily OSM import (TZ §6) ──────────────────────────────────
; job-run creates a fresh ephemeral container per fire and deletes it on
; exit — so a one-shot Python script fits naturally without a long-lived
; placeholder process eating RAM 24/7.
[job-run "parse-osm-daily"]
schedule = 0 0 3 * * *
image = georgia-places/parser:latest
network = infra_gp-net
environment = DB_HOST=postgres
environment = DB_PORT=5432
environment = DB_NAME=${DB_NAME}
environment = DB_USER=${DB_USER}
environment = DB_PASSWORD=${DB_PASSWORD}
no-overlap = true
delete = true

; ─── places_summary refresh: hourly CONCURRENTLY (TZ §12.2) ────────────
; job-exec runs inside an existing container — postgres is always up.
[job-exec "refresh-places-summary"]
schedule = 0 25 * * * *
container = gp-postgres
command = sh -c 'PGPASSWORD="$$POSTGRES_PASSWORD" psql -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -c "REFRESH MATERIALIZED VIEW CONCURRENTLY places_summary;"'
no-overlap = true
