# docker-compose.yml — Georgia Places monolith on single VPS
# RAM budget per ADR-0001 §RAM бюджет; mem_limits below MUST match it.

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: gp-postgres
    restart: on-failure
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 5
        delay: 10s
      resources:
        limits:
          memory: 350M
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      # Enforce safer defaults; ADR-0001 §RAM бюджет.
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - work_mem=4MB
      - -c
      - maintenance_work_mem=32MB
      - -c
      - max_connections=20
      - -c
      - effective_cache_size=256MB
      - -c
      - statement_timeout=5s
      - -c
      - lock_timeout=1s
      - -c
      - log_min_duration_statement=1000
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    networks:
      - gp-net

  api:
    build:
      context: ../backend
      dockerfile: src/GeorgiaPlaces.Api/Dockerfile
    image: georgia-places/api:latest
    container_name: gp-api
    restart: on-failure
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 5
        delay: 10s
      resources:
        limits:
          memory: 260M
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      ConnectionStrings__Default: "Host=${DB_HOST};Port=${DB_PORT};Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD};Pooling=true;Maximum Pool Size=10;Minimum Pool Size=1;"
    secrets:
      - otlp_headers
      - sentry_dsn
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/v1/health/live"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 30s
    networks:
      - gp-net

  nginx:
    image: nginx:1.27-alpine
    container_name: gp-nginx
    restart: on-failure
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 5
        delay: 10s
      resources:
        limits:
          memory: 32M
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certs:/etc/nginx/certs:ro
      - ../frontend:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 3s
      retries: 3
    networks:
      - gp-net

  # Cloudflare Quick Tunnel — публичный *.trycloudflare.com URL без аккаунта.
  # Профиль `tunnel` — стартует только явно (`docker compose --profile tunnel up -d`).
  # URL ищем в логах: `docker compose --profile tunnel logs tunnel | grep trycloudflare.com`.
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: gp-tunnel
    profiles: ["tunnel"]
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 64M
    depends_on:
      nginx:
        condition: service_healthy
    command: ["tunnel", "--no-autoupdate", "--url", "http://nginx:80"]
    networks:
      - gp-net

  # Parser image is built but no service runs it on `up -d` — ofelia
  # creates ephemeral containers from this image at scheduled times,
  # and `docker compose --profile manual run --rm parser` is still
  # available for ad-hoc owner-initiated runs.
  parser:
    build:
      context: ../parser
      dockerfile: Dockerfile
    image: georgia-places/parser:latest
    container_name: gp-parser
    profiles: ["manual"]
    deploy:
      resources:
        limits:
          memory: 320M
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    secrets:
      - otlp_headers
      - sentry_dsn
    environment:
      OTEL_SERVICE_NAME: georgia-places-parser
    networks:
      - gp-net

  # Ofelia — single in-Docker job scheduler, replaces host-side cron entirely
  # (BACKLOG Epic 5.1). Reads /etc/ofelia/config.ini, talks to Docker socket
  # to spawn ephemeral parser containers and exec into postgres for MV refresh.
  cron:
    image: mcuadros/ofelia:0.3.16
    container_name: gp-cron
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 32M
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    command: ["daemon", "--config=/etc/ofelia/config.ini"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./ofelia/config.ini:/etc/ofelia/config.ini:ro
    networks:
      - gp-net

networks:
  gp-net:
    driver: bridge

volumes:
  postgres-data:
    driver: local

secrets:
  otlp_headers:
    file: ./secrets/otlp_headers
  sentry_dsn:
    file: ./secrets/sentry_dsn
